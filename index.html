      Download: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>,
      Cloud: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"></path></svg>,
      CloudOff: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22.61 16.95A5 5 0 0 0 18 10h-1.26a8 8 0 0 0-7.05-6M5 5a8 8 0 0 0 4 15h9a5 5 0 0 0 1.7-.3"></path><line x1="2" y1="2" x2="22" y2="22"></line></svg>
    };

    const hkNames = [
      "奇異種子", "奇異草", "奇異花", "小火龍", "火恐龍", "噴火龍", "車厘龜", "卡美龜", "水箭龜", "綠毛蟲",
      "鐵甲蛹", "巴他蝶", "獨角蟲", "鐵殼蛹", "大針蜂", "波波", "比比鳥", "大比鳥", "小哥達", "哥達",
      "鬼雀", "大嘴雀", "阿柏蛇", "阿柏怪", "比卡超", "雷超", "穿山鼠", "穿山王", "尼多蘭", "尼多娜",
      "尼多后", "尼多郎", "尼多力諾", "尼多王", "皮皮", "皮可斯", "六尾", "九尾", "波波球", "肥波球",
      "超音蝠", "大嘴蝠", "走路草", "臭臭花", "霸王花", "蘑菇蟲", "巨菇蟲", "毛球", "末入蛾", "地鼠",
      "三地鼠", "喵喵怪", "貓老大", "傻鴨", "哥達鴨", "猴怪", "火爆猴", "護主犬", "奉神犬", "蚊香蝌蚪",
      "蚊香蛙", "快泳蛙", "卡斯", "尤基納", "胡地", "腕力", "豪力", "怪力", "喇叭芽", "口呆花",
      "大食花", "瑪瑙水母", "毒刺水母", "小拳石", "滾動石", "滾動岩", "小火馬", "烈焰馬", "呆呆獸", "大呆獸",
      "小磁怪", "三合一磁怪", "大蔥鴨", "嘟嘟", "嘟嘟利", "小海獅", "白海獅", "爛泥怪", "爛泥獸", "貝殼怪",
      "鐵甲貝", "鬼斯", "鬼斯通", "耿鬼", "大岩蛇", "催眠貘", "引夢貘人", "大鉗蟹", "巨鉗蟹", "霹靂彈",
      "頑皮彈", "蛋蛋", "椰蛋樹", "骨頭仔", "嘎啦嘎啦", "沙瓦郎", "艾比郎", "大舌頭", "毒氣丸", "毒氣雙子",
      "鐵甲犀牛", "鐵甲暴龍", "吉利蛋", "蔓藤怪", "袋獸", "墨海馬", "海刺龍", "角金魚", "金魚王", "海星星",
      "寶石海星", "吸盤小丑", "飛天螳螂", "迷唇姐", "電擊獸", "鴨嘴火龍", "大甲", "肯泰羅", "鯉魚王", "暴鯉龍",
      "乘龍", "百變怪", "伊貝", "水伊貝", "雷伊貝", "火伊貝", "立體龍", "菊石獸", "多刺菊石獸", "化石盔",
      "鐮刀盔", "化石飛龍", "卡比獸", "急凍鳥", "雷鳥", "火鳥", "迷你龍", "哈克龍", "啟暴龍", "超夢夢", "夢夢"
    ];

    function App() {
      const [pokemonList, setPokemonList] = useState([]);
      const [searchQuery, setSearchQuery] = useState('');
      const [filter, setFilter] = useState('all');
      const [isLoading, setIsLoading] = useState(true);
      const [trackerData, setTrackerData] = useState({});
      const [dbError, setDbError] = useState(false);

      // 資料初始化 (雲端同步 或 本地儲存)
      useEffect(() => {
        if (isFirebaseConfigured) {
          // 雲端模式：監聽 Firebase 即時變化
          const unsubscribe = collectionRef.onSnapshot((docSnap) => {
            if (docSnap.exists) {
              setTrackerData(docSnap.data());
              setDbError(false);
            } else {
              // 第一次使用，建立空資料庫
              collectionRef.set({}).catch(err => {
                console.error("無法建立雲端文件:", err);
                setDbError(true);
              });
            }
          }, (err) => {
            console.error("Firestore 連線錯誤:", err);
            setDbError(true);
          });
          return () => unsubscribe();
        } else {
          // 單機模式：讀取 Local Storage
          try {
            const saved = localStorage.getItem('hkPokemonPlushTracker');
            if (saved) setTrackerData(JSON.parse(saved));
          } catch (e) {}
        }
      }, []);

      // 若為單機模式或雲端失敗，資料改變時寫入 Local Storage 作為備份
      useEffect(() => {
        if (!isFirebaseConfigured || dbError) {
          localStorage.setItem('hkPokemonPlushTracker', JSON.stringify(trackerData));
        }
      }, [trackerData, dbError]);

      // 載入寶可夢資料
      useEffect(() => {
        const fetchPokemon = async () => {
          try {
            const response = await fetch('https://pokeapi.co/api/v2/pokemon?limit=151');
            const data = await response.json();
            const formatted = data.results.map((p, index) => ({
              id: index + 1,
              nameEn: p.name.charAt(0).toUpperCase() + p.name.slice(1),
              nameHk: hkNames[index],
              image: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${index + 1}.png`
            }));
            setPokemonList(formatted);
            setIsLoading(false);
          } catch (error) {
            console.error("無法獲取 Pokémon 資料", error);
            setIsLoading(false);
          }
        };
        fetchPokemon();
      }, []);

      // 更新邏輯 (同時支援雲端/本地)
      const handleDataUpdate = (newData) => {
        setTrackerData(newData);
        if (isFirebaseConfigured && !dbError) {
          // 寫入雲端
          collectionRef.set(newData, { merge: true }).catch(err => {
            console.error("雲端儲存失敗:", err);
            setDbError(true);
          });
        }
      };

      const toggleCollected = (id) => {
        const current = trackerData[id] || { collected: false, date: '', price: '', place: '' };
        const newData = { ...trackerData, [id]: { ...current, collected: !current.collected } };
        handleDataUpdate(newData);
      };

      const updateDetail = (id, field, value) => {
        const current = trackerData[id] || { collected: false, date: '', price: '', place: '' };
        const newData = { ...trackerData, [id]: { ...current, [field]: value } };
        handleDataUpdate(newData);
      };

      const handleDownloadWebpage = () => {
        window.print();
      };

      const filteredPokemon = useMemo(() => {
        return pokemonList.filter(p => {
          const matchSearch = 
            p.nameEn.toLowerCase().includes(searchQuery.toLowerCase()) || 
            p.nameHk.includes(searchQuery) ||
            String(p.id).includes(searchQuery);
          const isCollected = trackerData[p.id]?.collected;
          if (filter === 'collected') return matchSearch && isCollected;
          if (filter === 'missing') return matchSearch && !isCollected;
          return matchSearch;
        });
      }, [pokemonList, trackerData, searchQuery, filter]);

      const collectedCount = Object.values(trackerData).filter(d => d.collected).length;
      const progressPercentage = pokemonList.length > 0 ? Math.round((collectedCount / 151) * 100) : 0;

      if (isLoading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-red-500"></div>
          </div>
        );
      }

      return (
        <div className="min-h-screen pb-20 md:pb-8">
          {/* 狀態提示列 */}
          {dbError ? (
            <div className="no-print text-center py-2 text-sm font-bold flex justify-center items-center gap-2 bg-red-100 text-red-700">
              <Icons.CloudOff /> 雲端連線失敗 (請確認已在 Firebase 中建立 Firestore 並設為 Test Mode)，目前轉為單機儲存
            </div>
          ) : isFirebaseConfigured ? (
            <div className="no-print text-center py-2 text-sm font-bold flex justify-center items-center gap-2 bg-blue-100 text-blue-700">
              <Icons.Cloud /> 雲端同步已啟用，你的收藏進度已自動儲存
            </div>
          ) : (
             <div className="no-print text-center py-2 text-sm font-bold flex justify-center items-center gap-2 bg-amber-100 text-amber-700">
              <Icons.CloudOff /> 目前為單機模式
            </div>
          )}

          <div className="sticky top-0 z-50 bg-white shadow-md px-4 py-4 md:px-8 border-b-4 border-red-500 no-print">
            <div className="max-w-4xl mx-auto">
              <div className="flex justify-between items-end mb-2">
                <div>
                  <h1 className="text-xl md:text-2xl font-bold tracking-tight text-slate-800">
                    All Star 玩偶收藏追蹤器
                  </h1>
                  <p className="text-sm text-slate-500 font-medium">初代 151 隻 (香港譯名版)</p>
                </div>
                <div className="flex flex-col items-end gap-2">
                  <div className="text-right">
                    <span className="text-2xl font-black text-red-600">{collectedCount}</span>
                    <span className="text-slate-400 font-medium"> / 151</span>
                  </div>
                  <button 
                    onClick={handleDownloadWebpage}
                    className="flex items-center gap-1.5 text-sm font-semibold text-white bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded-lg transition-colors shadow-sm"
                  >
                    <Icons.Download />
                    <span>下載 (PDF)</span>
                  </button>
                </div>
              </div>
              
              <div className="w-full bg-slate-100 rounded-full h-3 mb-4 overflow-hidden border border-slate-200">
                <div className="bg-red-500 h-3 rounded-full transition-all duration-500" style={{ width: `${progressPercentage}%` }}></div>
              </div>

              <div className="flex flex-col sm:flex-row gap-3">
                <div className="relative flex-1">
                  <div className="absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"><Icons.Search /></div>
                  <input 
                    type="text" 
                    placeholder="搜尋名稱或編號 (例如: 025 或 比卡超)" 
                    className="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 focus:bg-white text-sm"
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                  />
                </div>
                <div className="flex gap-2">
                  {[
                    { id: 'all', label: '全部' }, 
                    { id: 'collected', label: '已收藏' }, 
                    { id: 'missing', label: '未收藏' }
                  ].map(f => (
                    <button
                      key={f.id}
                      onClick={() => setFilter(f.id)}
                      className={`px-4 py-2.5 rounded-xl text-sm font-semibold transition-colors flex-1 sm:flex-none ${
                        filter === f.id ? 'bg-red-500 text-white' : 'bg-white border border-slate-200 text-slate-600'
                      }`}
                    >
                      {f.label}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </div>

          <div className="max-w-4xl mx-auto p-4 md:p-8">
            <div className="hidden print:block mb-6 text-center">
               <h1 className="text-2xl font-bold">Pokemon All Star 玩偶收藏清單 (已收集: {collectedCount}/151)</h1>
            </div>

            {filteredPokemon.length === 0 ? (
              <div className="text-center py-12 text-slate-500 no-print">
                <p className="text-lg font-medium">找不到符合的 Pokémon。</p>
              </div>
            ) : (
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                {filteredPokemon.map(p => (
                  <PokemonCard 
                    key={p.id} 
                    pokemon={p} 
                    data={trackerData[p.id] || { collected: false, date: '', price: '', place: '' }}
                    onToggle={() => toggleCollected(p.id)}
                    onUpdate={(field, value) => updateDetail(p.id, field, value)}
                  />
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    function PokemonCard({ pokemon, data, onToggle, onUpdate }) {
      const [isExpanded, setIsExpanded] = useState(false);
      const formattedId = String(pokemon.id).padStart(3, '0');

      useEffect(() => {
        if (data.collected && !data.date && !data.price && !data.place) {
          setIsExpanded(true);
        }
      }, [data.collected]);

      return (
        <div className={`bg-white rounded-2xl p-4 shadow-sm border transition-all print-border print-shadow-none ${
          data.collected ? 'border-green-400 bg-green-50/20' : 'border-slate-200'
        }`} style={{ breakInside: 'avoid' }}>
          <div className="flex items-center gap-4">
            <button onClick={onToggle} className="flex-shrink-0 focus:outline-none rounded-full no-print">
              {data.collected ? (
                <Icons.CheckCircle className="text-green-500" />
              ) : (
                <Icons.Circle className="text-slate-300" />
              )}
            </button>
            
            <div className="hidden print:flex flex-shrink-0 w-8 h-8 border-2 border-slate-800 rounded-md items-center justify-center">
               {data.collected && <span className="text-xl font-bold text-slate-800">✓</span>}
            </div>

            <div className="flex-1 flex items-center gap-3 cursor-pointer" onClick={() => setIsExpanded(!isExpanded)}>
              <div className="w-16 h-16 bg-slate-100 rounded-xl flex items-center justify-center p-2">
                 <img src={pokemon.image} alt={pokemon.nameHk} className="w-full h-full object-contain" loading="lazy" />
              </div>
              <div>
                <span className="text-xs font-bold text-slate-400">#{formattedId}</span>
                <div className="flex items-baseline gap-2">
                  <h3 className="text-lg font-bold text-slate-800">{pokemon.nameHk}</h3>
                  <span className="text-xs text-slate-500 font-medium">{pokemon.nameEn}</span>
                </div>
                {data.collected && (data.price || data.place) && (
                  <p className="text-xs text-slate-500 mt-1 truncate max-w-[150px]">
                    {data.price && <span className="font-medium mr-1 text-slate-700">{data.price}</span>}
                    {data.place && <span>• {data.place}</span>}
                  </p>
                )}
              </div>
            </div>

            <button onClick={() => setIsExpanded(!isExpanded)} className="p-2 text-slate-400 rounded-lg no-print">
              {isExpanded ? <Icons.ChevronUp /> : <Icons.ChevronDown />}
            </button>
          </div>

          {isExpanded && (
            <div className="mt-4 pt-4 border-t border-slate-100 grid grid-cols-2 gap-3 no-print">
              <div className="col-span-1">
                <label className="block text-xs font-semibold text-slate-500 mb-1.5">購買日期</label>
                <input type="date" value={data.date} onChange={(e) => onUpdate('date', e.target.value)} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none" />
              </div>
              <div className="col-span-1">
                <label className="block text-xs font-semibold text-slate-500 mb-1.5">價格</label>
                <input type="text" placeholder="例如: $150" value={data.price} onChange={(e) => onUpdate('price', e.target.value)} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none" />
              </div>
              <div className="col-span-2">
                <label className="block text-xs font-semibold text-slate-500 mb-1.5">購買地點 / 店鋪</label>
                <input type="text" placeholder="例如: 旺角信和、Carousell..." value={data.place} onChange={(e) => onUpdate('place', e.target.value)} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none" />
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
